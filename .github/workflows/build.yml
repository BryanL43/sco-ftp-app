name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Read Build Config
        id: config
        run: python scripts/ExportBuildConfig.py

      - name: Extract Version
        id: version
        shell: pwsh
        run: |
          $VERSION = "${{ steps.config.outputs.app_major }}.${{ steps.config.outputs.app_minor }}.${{ github.run_number }}"
          echo "version=$VERSION" >> $env:GITHUB_OUTPUT

      - name: Build Application
        run: |
          pyinstaller `
            --onefile `
            --noconsole `
            --windowed `
            --distpath dist `
            --name "${{ steps.config.outputs.app_exe_base }}" `
            "${{ steps.config.outputs.app_entry }}"

      - name: Prepare Release Directory
        shell: pwsh
        run: |
          Remove-Item release -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path release

          Copy-Item `
            "dist\${{ steps.config.outputs.app_exe }}" `
            release\

          # Copy-Item `
          #   "dist\Updater.exe" `
          #   release\ `
          #   -ErrorAction SilentlyContinue

          Copy-Item `
            bin `
            release\bin `
            -Recurse

      - name: Create Update ZIP
        shell: pwsh
        run: |
          Compress-Archive `
            -Path release\* `
            -DestinationPath "${{ steps.config.outputs.app_name }}-${{ steps.version.outputs.version }}.zip"

      - name: Install NSIS
        shell: pwsh
        run: |
          if (-not (Test-Path "C:\Program Files (x86)\NSIS\makensis.exe")) {
            choco install nsis -y
          }

      - name: Compile NSIS Installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" .\installer\installer.nsi

      - name: Copy Installer
        shell: pwsh
        run: |
          Copy-Item `
            "dist\${{ steps.config.outputs.app_name }}-${{ steps.version.outputs.version }}-setup.exe" `
            "${{ steps.config.outputs.app_name }}-${{ steps.version.outputs.version }}-setup.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ steps.config.outputs.app_name }}-${{ steps.version.outputs.version }}.zip
            ${{ steps.config.outputs.app_name }}-${{ steps.version.outputs.version }}-setup.exe
