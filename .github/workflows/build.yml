name: Build

# Allows the application & creates a GitHub release when a new tag is pushed.
permissions:
  contents: write

# Trigger the workflow manually from the Actions tab in GitHub.
# No tag push trigger is used since the version is determined dynamically based on existing tags.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Export application configuration
        id: config
        run: python scripts/ExportAppConfig.py

      - name: Extract Version
        id: version
        shell: pwsh
        run: |
          git fetch --tags --force

          $MAJOR = "${{ steps.config.outputs.app_major }}"
          $MINOR = "${{ steps.config.outputs.app_minor }}"
          $PREFIX = "v$MAJOR.$MINOR."

          $latest = git tag --list "$PREFIX*" --sort=-version:refname | Select-Object -First 1

          if ($latest) {
            $PATCH = [int]($latest -replace "^v$MAJOR\.$MINOR\.", "") + 1
          }
          else {
            $PATCH = 0
          }

          $VERSION = "$MAJOR.$MINOR.$PATCH"
          echo "version=$VERSION" >> $env:GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $env:GITHUB_OUTPUT

      - name: Build Application
        shell: pwsh
        run: |
          pyinstaller `
            --onefile `
            --noconsole `
            --windowed `
            --add-data "application.ini;." `
            --distpath dist `
            --name "${{ steps.config.outputs.app_name }}" `
            "${{ steps.config.outputs.app_entry }}"

      - name: Build Updater
        shell: pwsh
        run: |
          pyinstaller `
            --onefile `
            --noconsole `
            --windowed `
            --distpath dist `
            --name "updater" `
            "scripts\CreateUpdater.py"

      - name: Prepare Package Directory
        shell: pwsh
        run: |
          Remove-Item package -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path package
          New-Item -ItemType Directory -Force -Path package\application
          New-Item -ItemType Directory -Force -Path package\updater

          Copy-Item `
            "dist\${{ steps.config.outputs.app_name }}.exe" `
            package\application\

          Copy-Item `
            "dist\updater.exe" `
            package\updater\

          Copy-Item `
            bin `
            package\application\bin `
            -Recurse

      - name: Create Update ZIP
        shell: pwsh
        run: |
          Compress-Archive `
            -Path package\* `
            -DestinationPath "${{ steps.config.outputs.app_name }}-${{ steps.version.outputs.version }}.zip"

      - name: Create Update Manifest
        shell: pwsh
        run: |
          $packageName = "${{ steps.config.outputs.app_name }}-${{ steps.version.outputs.version }}.zip"

          $packageHash = Get-FileHash `
            -Algorithm SHA256 `
            -Path $packageName

          $updaterHash = Get-FileHash `
            -Algorithm SHA256 `
            -Path "package\updater\updater.exe"

          $manifest = [ordered]@{
            app_name = "${{ steps.config.outputs.app_name }}"
            version = "${{ steps.version.outputs.version }}"
            package_name = $packageName
            package_sha256 = $packageHash.Hash.ToLowerInvariant()
            app_dir = "application"
            updater_path = "updater/updater.exe"
            updater_sha256 = $updaterHash.Hash.ToLowerInvariant()
            preserve = @("logs", "uninstall.exe")
            created_at = [DateTime]::UtcNow.ToString("yyyy-MM-ddTHH:mm:ssZ")
          }

          $json = $manifest | ConvertTo-Json -Depth 3
          $json = $json -replace '":\s+', '": '

          $preserveJson = (($manifest.preserve | ConvertTo-Json -Compress) -replace '","', '", "')
          $json = $json -replace '(?s)"preserve":\s*\[.*?\]', "`"preserve`": $preserveJson"

          $utf8NoBom = [System.Text.UTF8Encoding]::new($false)
          [System.IO.File]::WriteAllText($manifestPath, $json, $utf8NoBom)

      - name: Install NSIS
        shell: pwsh
        run: |
          if (-not (Test-Path "C:\Program Files (x86)\NSIS\makensis.exe")) {
            choco install nsis -y
          }

      - name: Compile NSIS Installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" `
            /DAPP_VERSION="${{ steps.version.outputs.version }}" `
            /DAPP_NAME="${{ steps.config.outputs.app_name }}" `
            /DAPP_TO_PACKAGE_EXE="..\dist\${{ steps.config.outputs.app_name }}.exe" `
            .\installer\installer.nsi

      - name: Copy Installer
        shell: pwsh
        run: |
          Copy-Item `
            "dist\${{ steps.config.outputs.app_name }}-${{ steps.version.outputs.version }}-setup.exe" `
            "${{ steps.config.outputs.app_name }}-${{ steps.version.outputs.version }}-setup.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            manifest.json
            ${{ steps.config.outputs.app_name }}-${{ steps.version.outputs.version }}.zip
            ${{ steps.config.outputs.app_name }}-${{ steps.version.outputs.version }}-setup.exe
